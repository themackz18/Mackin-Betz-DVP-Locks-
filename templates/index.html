<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power4 NBA Report</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        h1 {
            color: #60a5fa;
            text-align: center;
        }
        .last-updated {
            text-align: center;
            color: #94a3b8;
            font-size: 0.95em;
        }
        .report {
            background: #1e2937;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.95em;
            overflow-x: auto;
        }
        .no-data {
            text-align: center;
            color: #f87171;
            font-style: italic;
        }
        a {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <h1>🔥 Power4 NBA Report</h1>
    
    {% if report %}
        <div class="last-updated">
            Last updated: {{ report.get('timestamp') or 'Unknown' }}
        </div>
        
        <div class="report">
            {{ report | tojson(indent=2) }}
        </div>
    {% else %}
        <p class="no-data">No report data available yet.</p>
        <p style="text-align:center;">
            <a href="/refresh">Click here to run the scraper now</a>
        </p>
    {% endif %}

    <p style="text-align:center; margin-top: 40px; font-size: 0.9em;">
        <a href="/api/report">View JSON API</a> • 
        <a href="/refresh">Manual Refresh</a>
    </p>
</body>
</html>
